<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T-0 — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script>
    (function(){ const t=localStorage.getItem('t0-theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <style>
    /* ── AUTH PAGE SPECIFIC ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-page .hero-bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,107,43,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,43,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .auth-page .glow-orb { position: fixed; }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border-col);
      border-radius: 10px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--orange);
      text-align: center;
      margin-bottom: 0.25rem;
      letter-spacing: 2px;
    }
    .auth-tagline {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-sec);
      margin-bottom: 2rem;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-col);
      margin-bottom: 1.75rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-sec);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .auth-tab.active { color: var(--text); border-bottom-color: var(--orange); }

    .auth-field { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.1rem; }
    .auth-field label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-sec); }
    .auth-field input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .auth-field input:focus { border-color: var(--orange); }

    /* Role selector on signup */
    .role-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.1rem;
    }
    .role-pill {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-col);
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      background: var(--card-bg);
      transition: all 0.2s;
    }
    .role-pill:hover { border-color: #444; }
    .role-pill.selected { border-color: var(--orange); background: rgba(255,107,43,0.06); }
    .role-pill .rp-icon { font-size: 1.5rem; display: block; margin-bottom: 0.25rem; }
    .role-pill .rp-label { font-size: 0.82rem; font-weight: 600; color: var(--text); display: block; }
    .role-pill .rp-desc { font-size: 0.72rem; color: var(--text-sec); display: block; margin-top: 0.15rem; }

    .btn-auth {
      width: 100%;
      padding: 0.85rem;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: var(--text-sec);
      font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-col);
    }

    .btn-google {
      width: 100%;
      padding: 0.8rem;
      background: var(--card-bg);
      border: 1px solid var(--border-col);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.2s;
    }
    .btn-google:hover { background: rgba(255,255,255,0.04); border-color: #444; }
    .btn-google svg { width: 18px; height: 18px; }

    .auth-error {
      background: rgba(220,53,69,0.1);
      border: 1px solid rgba(220,53,69,0.3);
      color: #ff6b7a;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: rgba(40,199,111,0.1);
      border: 1px solid rgba(40,199,111,0.3);
      color: #28c76f;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
    }
    .auth-success.show { display: block; }

    .auth-loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* Your User ID box (shown after login) */
    .your-id-box {
      background: rgba(255,107,43,0.06);
      border: 1px solid rgba(255,107,43,0.2);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .your-id-box.show { display: block; }
    .your-id-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--orange); margin-bottom: 0.4rem; }
    .your-id-value { font-family: monospace; font-size: 0.78rem; color: var(--text-sec); word-break: break-all; }
    .copy-id-btn {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      padding: 0.3rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border-col);
      color: var(--text-sec);
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .copy-id-btn:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="hero-bg-grid"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>

  <div class="auth-box">
    <div class="auth-logo">T-0</div>
    <div class="auth-tagline">Train smarter. Track better.</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-signin">Sign In</div>
      <div class="auth-tab" id="tab-signup">Sign Up</div>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <!-- SIGN IN FORM -->
    <div id="form-signin">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="si-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-orange btn-auth" id="btn-signin">Sign in</button>
      <div class="auth-divider">or</div>
      <button class="btn-google" id="btn-google-signin">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGN UP FORM -->
    <div id="form-signup" style="display:none">
      <div class="auth-field">
        <label>Full Name</label>
        <input type="text" id="su-name" placeholder="Omar Ahmed" autocomplete="name"/>
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
      </div>

      <div class="auth-field" style="margin-bottom:0.5rem">
        <label>I am a...</label>
      </div>
      <div class="role-row">
        <div class="role-pill selected" id="rp-coach" data-role="coach">
          <span class="rp-icon">🏅</span>
          <span class="rp-label">Coach</span>
          <span class="rp-desc">I train clients</span>
        </div>
        <div class="role-pill" id="rp-trainee" data-role="trainee">
          <span class="rp-icon">💪</span>
          <span class="rp-label">Trainee</span>
          <span class="rp-desc">I follow plans</span>
        </div>
      </div>

      <button class="btn btn-orange btn-auth" id="btn-signup">Create account</button>
      <div class="auth-divider">or</div>
      <button class="btn-google" id="btn-google-signup">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── TAB SWITCHING ── */
const tabSignin  = document.getElementById('tab-signin');
const tabSignup  = document.getElementById('tab-signup');
const formSignin = document.getElementById('form-signin');
const formSignup = document.getElementById('form-signup');

tabSignin.addEventListener('click', () => {
  tabSignin.classList.add('active'); tabSignup.classList.remove('active');
  formSignin.style.display = ''; formSignup.style.display = 'none';
  clearMessages();
});
tabSignup.addEventListener('click', () => {
  tabSignup.classList.add('active'); tabSignin.classList.remove('active');
  formSignup.style.display = ''; formSignin.style.display = 'none';
  clearMessages();
});

/* ── ROLE PILLS ── */
let selectedRole = 'coach';
document.querySelectorAll('.role-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    selectedRole = pill.getAttribute('data-role');
  });
});

/* ── MESSAGES ── */
const errEl = document.getElementById('auth-error');
const okEl  = document.getElementById('auth-success');
function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); okEl.classList.remove('show'); }
function showOk(msg)  { okEl.textContent  = msg; okEl.classList.add('show');  errEl.classList.remove('show'); }
function clearMessages() { errEl.classList.remove('show'); okEl.classList.remove('show'); }

/* ── REDIRECT AFTER LOGIN ── */
async function redirectToDashboard(userId) {
  const { data: profile } = await sb.from('profiles').select('role').eq('id', userId).single();
  const role = profile?.role || 'trainee';
  window.location.href = role === 'coach' ? 'coach.html' : 'trainee.html';
}

/* ── CHECK ALREADY LOGGED IN ── */
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) redirectToDashboard(session.user.id);
});

/* Handle OAuth redirect (Google) */
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    redirectToDashboard(session.user.id);
  }
});

/* ── SIGN IN ── */
document.getElementById('btn-signin').addEventListener('click', async () => {
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-password').value;
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }
  clearMessages();
  const btn = document.getElementById('btn-signin');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'Sign in'; btn.disabled = false;
  if (error) showErr(error.message);
});

/* ── SIGN UP ── */
document.getElementById('btn-signup').addEventListener('click', async () => {
  const name  = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-password').value;
  if (!name || !email || !pass) { showErr('Please fill in all fields.'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  clearMessages();
  const btn = document.getElementById('btn-signup');
  btn.textContent = 'Creating account…'; btn.disabled = true;
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name, role: selectedRole } }
  });
  btn.textContent = 'Create account'; btn.disabled = false;
  if (error) { showErr(error.message); return; }
  showOk('Account created! Check your email to confirm, then sign in.');
});

/* ── GOOGLE ── */
async function googleAuth() {
  clearMessages();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.hostname.includes('github.io') ? 'https://omar-c-137.github.io/T-0/auth.html' : window.location.origin + '/auth.html' }
  });
  if (error) showErr(error.message);
}
document.getElementById('btn-google-signin').addEventListener('click', googleAuth);
document.getElementById('btn-google-signup').addEventListener('click', googleAuth);
</script>
</body>
</html>
